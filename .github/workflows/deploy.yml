name: Deploy to Server

on:
  push:
    branches:
      - main # Trigger pada branch main (atau master)

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Execute Deployment Scripts on Server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            # 1. Masuk ke direktori project di server
            cd /path/to/your/server/project/min5TA
            
            # 2. Tarik kode terbaru dari GitHub
            git pull origin main
            
            # ========================
            # 3. DEPLOY BACKEND
            # ========================
            cd backend
            
            # Install dependensi PHP
            composer install --optimize-autoloader --no-dev
            
            # Migrasi database jika ada perubahan
            php artisan migrate --force
            
            # Bersihkan dan cache ulang config/route
            php artisan config:clear
            php artisan cache:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            # Pastikan permission folder storage benar
            chmod -R 775 storage bootstrap/cache
            
            # ========================
            # 4. DEPLOY FRONTEND
            # ========================
            cd ../frontend
            
            # Install dependensi Node.js
            npm install
            
            # Build React app untuk production
            npm run build
            
            # Restart Nginx/PM2/Queue worker jika perlu
            # sudo systemctl restart nginx
            # php artisan queue:restart
